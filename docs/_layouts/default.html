<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  {% assign current_url = page.url | replace: 'index.html', '' %}
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title-link" aria-label="Volver al inicio">
      <h1 class="site-title">{{ site.title }}</h1>
    </a>
    <p class="site-description">{{ site.description }}</p>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="{{ '/' | relative_url }}" class="{% if current_url == '/' %}active{% endif %}">Inicio</a>
      <a href="{{ '/proceso/' | relative_url }}" class="{% if current_url contains '/proceso/' %}active{% endif %}">Proceso</a>
      <a href="{{ site.repo_url }}" target="_blank" rel="noopener">Código</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Hecho por {{ site.author }}.</p>
  </footer>
</body>
</html>
