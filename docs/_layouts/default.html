<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">{{ site.title }}</h1>
    <div class="site-divider"></div>
    <p class="site-description">{{ site.description }}</p>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Inicio</a>
      <a href="{{ '/proceso/' | relative_url }}">Proceso</a>
      <a href="{{ site.repo_url }}">Código</a>
    </nav>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Hecho por {{ site.author }} · escritura generativa, edición automática y visuales editoriales.</p>
  </footer>
</body>
</html>
