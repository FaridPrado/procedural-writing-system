<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | strip_html | strip_newlines | truncate: 150 }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <h1 class="site-title">{{ site.title }}</h1>
    <div class="site-divider"></div>
    <nav class="site-nav" aria-label="Navegación principal">
      <a href="{{ '/' | relative_url }}">Inicio</a>
      <a href="{{ '/proceso/' | relative_url }}">Proceso</a>
      <a href="{{ site.repo_url }}">Código</a>
    </nav>
  </header>

  <main class="container">
    <article class="post-container">
      <header class="post-head">
        <div class="post-date">{{ page.date | date: "%d · %m · %Y" }}</div>
        <h1 class="post-title">{{ page.title }}</h1>
      </header>

      {% if page.image %}
        {% if page.image contains '://' %}
          <img src="{{ page.image }}" alt="{{ page.title }}" class="post-image" loading="lazy">
        {% else %}
          <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" class="post-image" loading="lazy">
        {% endif %}
      {% endif %}

      <div class="poem-text">
        {{ content }}
      </div>

      <div class="post-meta">
        <span>{{ page.tema }}</span>
      </div>

      <div class="post-meta">
        <a href="{{ '/' | relative_url }}" class="back-link">Volver al inicio</a>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <p>Farid Prado · Ecos del Alma</p>
  </footer>
</body>
</html>
